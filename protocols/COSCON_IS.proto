OutTerminator = LF;
InTerminator = LF;
LockTimeout = 5000;
ReplyTimeout = 1000;
ReadTimeout = 100;
WriteTimeout = 100;
ExtraInput = Ignore;

#init {
#}

# Info
ReadInfo {
    out "Info";
    in "Info OK: %[_a-zA-Z0-9().: ]";
}

# Uptime, in seconds
ReadUptime {
    out "Uptime";
    in "Uptime OK: %d";
}

# Device type
ReadDeviceType {
    out "GetDeviceType";
    in "GetDeviceType OK: %[_a-zA-Z0-9().: ]";
}

# Firmware Version
ReadFirmwareVersion {
    out "GetFirmwareVersion";
    in "GetFirmwareVersion OK: %[_a-zA-Z0-9().: ]";
}

# Device serial
ReadDeviceSerial {
    out "GetDeviceSerial";
    in "GetDeviceSerial OK: %[_a-zA-Z0-9().: ]";
}

# Identify
ReadIdentify {
    out "GetIdentify";
    in "GetIdentify OK: %{off|on}";
}

# Identify
WriteIdentify {
    out "SetIdentify %{off|on}";
    in "SetIdentify OK";
    @init{ReadIdentify;};
}

# Status
ReadStatus {
    out "GetStatus";
    in "GetStatus OK: %#s";
    # in "GetStatus OK: %[_a-zA-Z0-9().:\=\" ]";
}

# Identify
WriteSwitchToStandby {
    out "%{|SwitchToStandby}";
    in "%{|SwitchToStandby OK}";
}

# Identify
WriteSwitchToOff {
    out "SwitchToOff";
    in "SwitchToOff OK";
}
